rust  = "ZSTD_ldm_generateSequences_internal_prefixOnly"
other = "ZSTD_ldm_generateSequences_internal"
other_path = "zstd/lib/compress/zstd_ldm.c"

[[entries]]
rust  = "HUF_decompress1X1_usingDTable_internal"
other = "HUF_decompress1X1_usingDTable_internal_body"
other_path = "zstd/lib/decompress/huf_decompress.c"

[[entries]]
rust  = "HUF_decompress1X2_usingDTable_internal"
other = "HUF_decompress1X2_usingDTable_internal_body"
