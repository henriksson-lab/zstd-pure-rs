# ccc_mapping.toml — machine-readable twin of FUNCTIONS.md
#
# Every Rust ↔ C translation pair for `zstd-pure-rs` is pinned here so
# `ccc-rs compare` doesn't depend on fingerprint fallback OR accidentally
# pair with the legacy v0.1–v0.7 decoders under `lib/legacy/`. The file
# has three sections:
#
#   1. DISAMBIGUATION — Rust names that appear in more than one Rust
#      module. `rust_path` + `other_path` pin exactly which C function
#      each copy translates.
#   2. RENAMES — Rust names that differ from their upstream C peer.
#   3. IDENTICAL-NAME PAIRS — one `[[entries]]` per Rust ↔ C pair with
#      matching names. `other_path` is pinned so pairings can never
#      route to a v02/v03/…/v07 legacy copy. When upstream has several
#      non-legacy definitions (e.g. MEM_read* guarded by #ifdefs,
#      or POOL_* with/without MT), the first encountered path wins —
#      tree-sitter treats each #ifdef branch as a separate function
#      and they're equivalent for complexity-comparison purposes.
#
# Rust-only extensions intentionally NOT mapped: `_withOpStart`,
# `_with_history`, `_with_prefix`, `_probe`, `_framed` variants,
# CLI helpers in `src/bin/`, and private file-local helpers like
# `round`, `avalanche`, `from_bits`, `ct_u16_read`, etc.
#
# Invoke as:  ccc-rs compare rust.json c.json --mapping ccc_mapping.toml

# =====================================================================
# 1. DISAMBIGUATION
# =====================================================================

[[entries]]
rust       = "ZSTD_copy4"
rust_path  = "src/decompress/zstd_decompress_block.rs"
other      = "ZSTD_copy4"
other_path = "zstd/lib/decompress/zstd_decompress_block.c"

[[entries]]
rust       = "ZSTD_copy8"
rust_path  = "src/common/zstd_internal.rs"
other      = "ZSTD_copy8"
other_path = "zstd/lib/common/zstd_internal.h"

[[entries]]
rust       = "ZSTD_getBlockSize"
rust_path  = "src/compress/zstd_compress.rs"
other      = "ZSTD_getBlockSize"
other_path = "zstd/lib/compress/zstd_compress.c"

# =====================================================================
# 2. RENAMES
# =====================================================================

