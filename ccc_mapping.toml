other = "HUF_readStats_body"
other_path = "zstd/lib/common/entropy_common.c"

# BIT_highbit32 is the pre-1.5 name; upstream now exposes this as
# ZSTD_highbit32 in bits.h. Rust keeps the historical alias.
[[entries]]
rust  = "BIT_highbit32"
other = "ZSTD_highbit32"
other_path = "zstd/lib/common/bits.h"

# HUF_readDTableX1/X2 in our port dispatch to the wksp variants —
# upstream removed the non-wksp helpers in recent refactors.
[[entries]]
rust  = "HUF_readDTableX1"
other = "HUF_readDTableX1_wksp"
other_path = "zstd/lib/decompress/huf_decompress.c"

[[entries]]
rust  = "HUF_readDTableX2"
other = "HUF_readDTableX2_wksp"
other_path = "zstd/lib/decompress/huf_decompress.c"

# Upstream collapsed the tiny `ZSTDMT_createCCtx` convenience wrapper
# into `_advanced`; Rust keeps the plain name.
[[entries]]
rust  = "ZSTDMT_createCCtx"
other = "ZSTDMT_createCCtx_advanced"
other_path = "zstd/lib/compress/zstdmt_compress.c"

# Upstream inlines `FSE_decompress_usingDTable` into the _generic
# template; Rust's standalone function is the closest complexity peer.
[[entries]]
rust  = "FSE_decompress_usingDTable"
other = "FSE_decompress_usingDTable_generic"
other_path = "zstd/lib/common/fse_decompress.c"

# Rust's `_prefixOnly` is the extDict-free specialization of
# upstream's parameterized `ZSTD_insertBtAndGetAllMatches`.
[[entries]]
rust  = "ZSTD_insertBtAndGetAllMatches_prefixOnly"
other = "ZSTD_insertBtAndGetAllMatches"
other_path = "zstd/lib/compress/zstd_opt.c"

# HUF_buildCTable / HUF_writeCTable were renamed upstream to add
# explicit `_wksp` suffixes — Rust keeps the historical plain names.
[[entries]]
rust  = "HUF_buildCTable"
other = "HUF_buildCTable_wksp"
other_path = "zstd/lib/compress/huf_compress.c"

[[entries]]
rust  = "HUF_writeCTable"
other = "HUF_writeCTable_wksp"
other_path = "zstd/lib/compress/huf_compress.c"

# Rust's fn name elides the `_internal` infix that upstream keeps.
[[entries]]
rust  = "HUF_compress1X_usingCTable_body_loop"
other = "HUF_compress1X_usingCTable_internal_body_loop"
other_path = "zstd/lib/compress/huf_compress.c"

